<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Calculator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; }
        .calc-container { max-width: 350px; margin: 100px auto; }
        .display-box { height: 70px; font-size: 2.5rem; text-align: right; background-color: #e9ecef; }
        .btn-calc { width: 100%; height: 60px; font-size: 1.5rem; margin-bottom: 10px; border-radius: 10px; }
    </style>
</head>
<body>

<div class="container calc-container">
    <div class="card shadow p-4 border-0 rounded-4">
        <input type="text" id="display" class="form-control display-box mb-3 fw-bold" disabled value="0">
        
        <div class="row">
            <div class="col-3"><button class="btn btn-danger btn-calc" onclick="clearDisplay()">C</button></div>
            <div class="col-3"><button class="btn btn-secondary btn-calc" onclick="deleteLast()">DEL</button></div>
            <div class="col-3"><button class="btn btn-warning btn-calc" onclick="appendValue('/')">/</button></div>
            <div class="col-3"><button class="btn btn-warning btn-calc" onclick="appendValue('*')">x</button></div>
        </div>
        <div class="row">
            <div class="col-3"><button class="btn btn-light btn-calc shadow-sm" onclick="appendValue('7')">7</button></div>
            <div class="col-3"><button class="btn btn-light btn-calc shadow-sm" onclick="appendValue('8')">8</button></div>
            <div class="col-3"><button class="btn btn-light btn-calc shadow-sm" onclick="appendValue('9')">9</button></div>
            <div class="col-3"><button class="btn btn-warning btn-calc" onclick="appendValue('-')">-</button></div>
        </div>
        <div class="row">
            <div class="col-3"><button class="btn btn-light btn-calc shadow-sm" onclick="appendValue('4')">4</button></div>
            <div class="col-3"><button class="btn btn-light btn-calc shadow-sm" onclick="appendValue('5')">5</button></div>
            <div class="col-3"><button class="btn btn-light btn-calc shadow-sm" onclick="appendValue('6')">6</button></div>
            <div class="col-3"><button class="btn btn-warning btn-calc" onclick="appendValue('+')">+</button></div>
        </div>
        <div class="row">
            <div class="col-9">
                <div class="row">
                    <div class="col-4"><button class="btn btn-light btn-calc shadow-sm" onclick="appendValue('1')">1</button></div>
                    <div class="col-4"><button class="btn btn-light btn-calc shadow-sm" onclick="appendValue('2')">2</button></div>
                    <div class="col-4"><button class="btn btn-light btn-calc shadow-sm" onclick="appendValue('3')">3</button></div>
                </div>
                <div class="row">
                    <div class="col-8"><button class="btn btn-light btn-calc shadow-sm" onclick="appendValue('0')">0</button></div>
                    <div class="col-4"><button class="btn btn-light btn-calc shadow-sm" onclick="appendValue('.')">.</button></div>
                </div>
            </div>
            <div class="col-3">
                <button class="btn btn-success btn-calc h-100 pb-3" onclick="calculateResult()">=</button>
            </div>
        </div>
    </div>
</div>

<script>
    const display = document.getElementById('display');

    function appendValue(value) {
        if(display.value === '0') display.value = value;
        else display.value += value;
    }

    function clearDisplay() {
        display.value = '0';
    }

    function deleteLast() {
        display.value = display.value.slice(0, -1);
        if(display.value === '') display.value = '0';
    }

    function calculateResult() {
        try {
            display.value = eval(display.value);
        } catch (error) {
            display.value = 'Error';
        }
    }
</script>
</body>
</html>
